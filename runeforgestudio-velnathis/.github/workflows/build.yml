name: Build Foundry Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @foundryvtt/foundryvtt-cli
      - name: Pack compendiums
        run: |
          for pack in actors items journal tables; do
            mkdir -p packs/$pack
            fvtt package pack $pack --in src/$pack --out packs --inputFormat json
          done
      - name: Zip module
        run: |
          mkdir -p dist/runeforgestudio-velnathis
          cp module.json LICENSE README.md dist/runeforgestudio-velnathis/
          cp -r packs assets dist/runeforgestudio-velnathis/
          cd dist && zip -r ../module.zip runeforgestudio-velnathis
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
